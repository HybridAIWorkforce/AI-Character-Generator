name: Scheduled Code Review

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      review_type:
        description: 'Type of review to perform'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - security
          - dependencies
          - performance

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Check for outdated dependencies
        run: yarn outdated || true

      - name: Run audit
        run: yarn audit --level moderate

      - name: Check for known vulnerabilities
        run: |
          yarn audit --json > audit-results.json || true
          cat audit-results.json | node -e "
            const data = '';
            process.stdin.on('data', c => data.push(c));
            process.stdin.on('end', () => {
              const results = JSON.parse(data.join(''));
              const advisories = results.advisories || {};
              const critical = Object.values(advisories).filter(a => a.severity === 'critical').length;
              const high = Object.values(advisories).filter(a => a.severity === 'high').length;
              console.log(\`Found \${critical} critical and \${high} high severity vulnerabilities\`);
              if (critical > 0) process.exit(1);
            });
          " || true

  code-quality-review:
    name: Code Quality Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run ESLint with review rules
        run: yarn lint:review || yarn lint

      - name: Run complexity analysis
        run: |
          echo "Analyzing code complexity..."
          npx complexity-report --format json app/ > complexity-report.json || true
          cat complexity-report.json | node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync(0, 'utf-8'));
            const highComplexity = data.reports.filter(r => r.complexity.cyclomatic > 10);
            console.log(\`Files with high cyclomatic complexity (>10): \${highComplexity.length}\`);
            highComplexity.forEach(f => console.log(\`  - \${f.info.file}: \${f.complexity.cyclomatic}\`));
          " || true

      - name: Generate code metrics
        run: |
          echo "## Code Metrics Report" > code-metrics.md
          echo "Generated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> code-metrics.md
          echo "" >> code-metrics.md
          echo "### File Statistics" >> code-metrics.md
          echo "- Total TypeScript files: $(find app components lib -name '*.ts' -o -name '*.tsx' 2>/dev/null | wc -l)" >> code-metrics.md
          echo "- Total lines of code: $(find app components lib -name '*.ts' -o -name '*.tsx' 2>/dev/null | xargs wc -l 2>/dev/null | tail -1 | awk '{print $1}')" >> code-metrics.md
          echo "" >> code-metrics.md
          echo "### Recent Commits" >> code-metrics.md
          git log --oneline -10 >> code-metrics.md || true
          cat code-metrics.md

  performance-review:
    name: Performance Review
    runs-on: ubuntu-latest
    if: github.event.inputs.review_type == 'performance' || github.event.inputs.review_type == 'full' || github.event.schedule == '0 9 * * 1'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build application
        run: yarn build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Analyze bundle size
        run: |
          echo "Analyzing bundle size..."
          ls -lh .next/static/chunks/ 2>/dev/null || echo "No static chunks found"
          du -sh .next/ 2>/dev/null || echo "No .next directory"

      - name: Check for large dependencies
        run: |
          echo "### Large Dependencies" > bundle-report.md
          yarn list --prod --depth=0 2>/dev/null | grep -E '^└─|^├─' | head -20 >> bundle-report.md || true
          cat bundle-report.md

  create-review-issue:
    name: Create Review Issue
    runs-on: ubuntu-latest
    needs: [security-scan, dependency-review, code-quality-review, performance-review]
    if: always()
    permissions:
      issues: write
    steps:
      - name: Create review summary issue
        uses: actions/github-script@v9
        with:
          script: |
            const results = {
              security: '${{ needs.security-scan.result }}',
              dependencies: '${{ needs.dependency-review.result }}',
              codeQuality: '${{ needs.code-quality-review.result }}',
              performance: '${{ needs.performance-review.result }}'
            };
            
            const date = new Date().toISOString().split('T')[0];
            const title = `📋 Scheduled Code Review - ${date}`;
            
            const body = `## Weekly Code Review Summary
            
            **Review Date:** ${new Date().toUTCString()}
            **Triggered By:** ${context.eventName === 'schedule' ? 'Scheduled (Weekly)' : 'Manual Dispatch'}
            
            ### Results
            
            | Check | Status |
            |-------|--------|
            | Security Scan | ${results.security === 'success' ? '✅ Passed' : '❌ Failed'} |
            | Dependency Review | ${results.dependencies === 'success' ? '✅ Passed' : '❌ Failed'} |
            | Code Quality Review | ${results.codeQuality === 'success' ? '✅ Passed' : '❌ Failed'} |
            | Performance Review | ${results.performance === 'success' ? '✅ Passed' : results.performance === 'skipped' ? '⏭️ Skipped' : '❌ Failed'} |
            
            ### Action Items
            - [ ] Review any failed checks above
            - [ ] Address security vulnerabilities if any
            - [ ] Update outdated dependencies
            - [ ] Review code complexity reports
            
            ### Notes
            - This issue was automatically created by the scheduled code review workflow
            - Check the workflow run for detailed logs and reports
            
            Run ID: ${context.runId}
            `;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['code-review', 'automated', 'maintenance']
            });